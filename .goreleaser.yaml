project_name: termi

builds:
    - id: termi
      main: ./main.go
      binary: termi
      env:
          - CGO_ENABLED=0
      goos:
          - linux
          - darwin
          - windows
      goarch:
          - amd64
          - arm64
      ignore:
          - goos: windows
            goarch: arm64

archives:
    - id: termi
      format: tar.gz
      name_template: '{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}'
      format_overrides:
          - goos: windows
            format: zip

checksum:
    name_template: checksums.txt

release:
    github:
        owner: VA-ibh-AV
        name: termi
